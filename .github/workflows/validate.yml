name: Validate Stack launch specs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate every launch_spec.json against its package
        run: |
          set -e
          status=0
          # Find every launch_spec.json except the blank template.
          specs=$(find . -name launch_spec.json -not -path './templates/*' -not -path './.git/*')
          if [ -z "$specs" ]; then
            echo "No launch_spec.json files found."
            exit 0
          fi
          for spec in $specs; do
            echo "::group::Validating $spec"
            if python3 scripts/validate_launch_spec.py "$spec"; then
              echo "PASS: $spec"
            else
              echo "::error file=$spec::Validation failed for $spec"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status

      - name: JSON Schema check (optional, informational)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet jsonschema
          python3 - <<'PY'
          import json, glob, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open("schema/launch_spec.schema.json"))
          v = Draft202012Validator(schema)
          bad = 0
          for path in glob.glob("**/launch_spec.json", recursive=True):
              if path.startswith("templates/"):
                  continue
              data = json.load(open(path))
              errs = sorted(v.iter_errors(data), key=lambda e: e.path)
              if errs:
                  bad += 1
                  print(f"[schema] {path}:")
                  for e in errs:
                      loc = ".".join(str(p) for p in e.path) or "(root)"
                      print(f"  - {loc}: {e.message}")
          print("Schema check complete." if not bad else f"{bad} file(s) have schema notes.")
          PY
